<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-RAD - Groupe de Musique Folk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', Georgia, serif; }
    </style>
</head>
<body class="bg-[#FAF6EE] text-[#3D251E] min-h-screen flex flex-col pt-20">

    <script id="configuration-site">
        // TEXTES DU SITE
        const siteTexts = {
            subtitle: "La chaleur du folk, le souffle de la danse",
            newsTitle: "Nouveau groupe !",
            newsText: "Inspiré des parquets de bal. Préparez-vous à voyager entre mélodies envoûtantes et rythmiques endiablées.",
            // Utilisation de ` à la place de " pour permettre les sauts de ligne
            bioText: `T-RAD (prononcez Ti-RAD), un tout nouveau groupe qui vous propose des musiques folk et traditionnelles à danser.
            
Porté par Naomi (flûte, toy-piano), Florian (viole de gambe, percussions) et Antoine (guitare, bouzouki), le trio vous fera vibrer par un enchaînement de morceaux à la fois énergiques, dansants et profondément envoûtants.

Une invitation chaleureuse et vibrante à entrer directement dans la danse.`
        };

        // AGENDA (Ajoutez ou modifiez vos dates ici)
        const siteAgenda = [
            { 
                date: "Octobre", 
                title: "Répétition publique", 
                place: "Villeneuve d'Ascq",
                ticketUrl: "https://lafermedenhaut.villeneuvedascq.fr/agenda-de-la-ferme-den-haut", 
                fbUrl: "https://agendatrad.org/calendar/France/Hauts-de-France/Nord", 
                orgUrl: "https://example.com/organisateur" 
            },
            { 
                date: "Novembre", 
                title: "Bal des Compagnons du Devoir", 
                place: "Villeneuve d'Ascq",
                ticketUrl: "", 
                fbUrl: "https://facebook.com/events/2", 
                orgUrl: "" 
            },
            { 
                date: "Décembre", 
                title: "MoederBal", 
                place: "Halluin",
                ticketUrl: "https://www.facebook.com/moederbal.bal/?locale=fr_FR", 
                fbUrl: "https://facebook.com/events/2", 
                orgUrl: "" 
            }
        ];

        // PHOTOS (Ajoutez les adresses de vos images ici)
        const sitePhotos = [
            "https://lh3.googleusercontent.com/pw/AP1GczN6jTEk6eME1dCwd3IENmq1sLgnTEts3fuaD1hRNot3KsPGYMimwelwV4O2bMz_0lBEqarNX3OL4BuhDcosqex60ZTKsZTZ9gLRQ3i_IoAoJDyQHg=w2400",
            "https://images.unsplash.com/photo-1471478331149-c72f17e33c73?q=80&w=1169&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D",
            ""
        ];

        // VIDÉOS (Ajoutez vos liens YouTube ou Vimeo)
        const siteVideos = [
            { title: "T-RAD - Live xxxxxxxxxx", url: "https://xxxxxxxxxxx" },
            { title: "Rxxxxx", url: "" }
        ];
    </script>

    <header class="fixed top-0 left-0 right-0 bg-[#FAF6EE]/90 backdrop-blur-md border-b border-[#1E352F]/10 z-50">
        <div class="max-w-6xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="#" class="font-serif text-3xl font-bold text-[#1E352F] tracking-wide">T-RAD</a>
            <nav class="hidden md:flex space-x-6">
                <a href="#accueil" class="font-medium text-[#1E352F]/80 hover:text-[#D36B4F] transition-colors">Accueil</a>
                <a href="#agenda" class="font-medium text-[#1E352F]/80 hover:text-[#D36B4F] transition-colors">Agenda</a>
                <a href="#medias" class="font-medium text-[#1E352F]/80 hover:text-[#D36B4F] transition-colors">Médias</a>
            </nav>
        </div>
    </header>

    <section id="accueil" class="relative h-[60vh] bg-[#1E352F] flex items-center justify-center text-center px-4 overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center opacity-40 mix-blend-overlay" style="background-image: url('https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?q=80&w=1600&auto=format&fit=crop');"></div>
        <div class="relative z-10 max-w-3xl">
            <h1 class="font-serif text-6xl md:text-8xl font-bold text-[#FAF6EE] mb-4">T-RAD</h1>
            <p id="hero-subtitle" class="font-serif italic text-xl md:text-2xl text-[#FAF6EE]/90 mb-8"></p>
            <a href="#agenda" class="bg-[#D36B4F] text-[#FAF6EE] px-8 py-3 rounded-md font-semibold hover:bg-[#D36B4F]/90 transition-all shadow-md">Voir nos dates</a>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-4 py-16 grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
        <div>
            <span class="text-[#D36B4F] font-semibold tracking-wider uppercase text-sm">Actualités</span>
            <h2 id="news-title" class="font-serif text-4xl text-[#1E352F] mt-2 mb-6"></h2>
            <p id="news-text" class="text-[#3D251E]/80 leading-relaxed mb-6"></p>
        </div>
        <div class="bg-[#1E352F]/5 p-8 rounded-2xl border border-[#1E352F]/10">
            <h3 class="font-serif text-2xl text-[#1E352F] mb-4">Qui sommes-nous ?</h3>
            <p id="bio-text" class="text-[#3D251E]/80 leading-relaxed"></p>
        </div>
    </section>

    <section id="agenda" class="bg-[#1E352F]/5 py-16">
        <div class="max-w-4xl mx-auto px-4">
            <h2 class="font-serif text-5xl text-[#1E352F] mb-4 text-center">Notre Agenda</h2>
            <p class="text-center text-[#3D251E]/70 mb-12">Venez partager un moment de danse et d'écoute.</p>
            <div id="agenda-list" class="space-y-6"></div>
        </div>
    </section>

    <section id="medias" class="max-w-6xl mx-auto px-4 py-16 space-y-12">
        <h2 class="font-serif text-5xl text-[#1E352F] text-center">Médias</h2>
        
        <div class="space-y-6">
            <h3 class="font-serif text-2xl text-[#1E352F]">Photos</h3>
            <div id="photos-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </div>

        <div class="space-y-6 pt-6 border-t border-[#1E352F]/10">
            <h3 class="font-serif text-2xl text-[#1E352F]">Vidéos</h3>
            <div id="videos-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </section>

    <footer class="bg-[#1E352F] text-[#FAF6EE] py-12 mt-auto text-center border-t border-[#FAF6EE]/10">
        <div class="max-w-xl mx-auto px-4 space-y-4">
            <p class="text-lg font-serif">Nous contacter pour un bal ou concert :</p>
            <p class="text-xl font-bold">
                📧 
                <a href="mailto:TiRADfolk@gmail.com" class="text-[#D36B4F] hover:underline transition-all">
                    TiRADfolk@gmail.com
                </a>
            </p>
            <div class="h-[1px] bg-[#FAF6EE]/10 my-6 w-1/2 mx-auto"></div>
            <p class="text-xs text-[#FAF6EE]/60">© 2026 T-RAD. Tous droits réservés.</p>
        </div>
    </footer>

    <script>
        // Nettoyage complet des anciennes données locales pour éviter les conflits de cache
        localStorage.removeItem('T-RAD_texts');
        localStorage.removeItem('T-RAD_agenda');
        localStorage.removeItem('T-RAD_photos');
        localStorage.removeItem('T-RAD_videos');
        localStorage.removeItem('T-RAD_musics');
        localStorage.removeItem('T-RAD_todos');

        function renderSite() {
            // Textes
            document.getElementById('hero-subtitle').innerText = siteTexts.subtitle;
            document.getElementById('news-title').innerText = siteTexts.newsTitle;
            document.getElementById('news-text').innerText = siteTexts.newsText;
            document.getElementById('bio-text').innerText = siteTexts.bioText;

            // Agenda public
            const agendaDiv = document.getElementById('agenda-list');
            agendaDiv.innerHTML = siteAgenda.map(item => {
                let buttonsHtml = '';
                if (item.ticketUrl) {
                    buttonsHtml += `<a href="${item.ticketUrl}" target="_blank" class="bg-[#D36B4F] text-white px-4 py-2 rounded text-sm hover:bg-[#D36B4F]/90 font-medium">🎫 Organisateur</a>`;
                }
                if (item.fbUrl) {
                    buttonsHtml += `<a href="${item.fbUrl}" target="_blank" class="bg-[#3B5998] text-white px-4 py-2 rounded text-sm hover:bg-[#3B5998]/90 font-medium">📅 Lien</a>`;
                }
                if (item.orgUrl) {
                    buttonsHtml += `<a href="${item.orgUrl}" target="_blank" class="bg-[#1E352F] text-white px-4 py-2 rounded text-sm hover:bg-[#1E352F]/90 font-medium">🌐 Lien</a>`;
                }

                return `
                    <div class="bg-white rounded-xl p-6 shadow-sm border border-[#1E352F]/5 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <span class="text-sm font-semibold text-[#D36B4F]">${item.date}</span>
                            <h3 class="font-serif text-xl text-[#1E352F] font-bold mt-1">${item.title}</h3>
                            <p class="text-sm text-[#3D251E]/60">${item.place}</p>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${buttonsHtml || '<span class="text-xs italic text-gray-400">Entrée libre / Pas de lien</span>'}
                        </div>
                    </div>
                `;
            }).join('');

            // Photos publiques
            const photosDiv = document.getElementById('photos-grid');
            photosDiv.innerHTML = sitePhotos.map(url => `
                <img src="${url}" class="rounded-xl object-cover h-64 w-full shadow-md hover:scale-105 transition-transform" alt="Photo">
            `).join('');

            // Vidéos publiques
            const videosDiv = document.getElementById('videos-grid');
            videosDiv.innerHTML = siteVideos.map(vid => `
                <div class="aspect-video w-full rounded-2xl overflow-hidden shadow-lg border border-[#1E352F]/10 bg-[#1E352F] flex flex-col items-center justify-center text-white gap-2">
                    <span class="font-serif italic text-lg px-4 text-center">${vid.title}</span>
                    ${vid.url ? `<a href="${vid.url}" target="_blank" class="bg-[#D36B4F] p-4 rounded-full hover:scale-110 transition-transform">▶ Regarder</a>` : `<span class="text-xs text-gray-400">Vidéo bientôt disponible</span>`}
                </div>
            `).join('');
        }

        // Lancement du site
        renderSite();
    </script>
</body>
</html>
